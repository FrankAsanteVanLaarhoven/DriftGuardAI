apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: driftguard
  namespace: driftguard
  labels:
    app.kubernetes.io/name: driftguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: driftguard
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
