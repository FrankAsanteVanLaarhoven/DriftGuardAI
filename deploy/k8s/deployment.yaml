apiVersion: apps/v1
kind: Deployment
metadata:
  name: driftguard
  namespace: driftguard
  labels:
    app.kubernetes.io/name: driftguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: driftguard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: driftguard
    spec:
      serviceAccountName: driftguard
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # CI overrides this with the ECR image by commit SHA (kubectl set image).
          image: driftguard:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DRIFTGUARD_PRIMARY_MODEL_URI
              value: "models:/driftguard@production"
            - name: DRIFTGUARD_MLFLOW_TRACKING_URI
              value: "http://mlflow.driftguard.svc.cluster.local:5000"
          # Liveness = process up. Readiness = /ready (200 if ANY model can serve,
          # so a bad primary never pulls the pod out of rotation).
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: http }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
