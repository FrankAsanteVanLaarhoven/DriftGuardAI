apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply everything:  kubectl apply -k deploy/k8s
# Roll back a bad release (idempotent):  kubectl -n driftguard rollout undo deployment/driftguard
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
