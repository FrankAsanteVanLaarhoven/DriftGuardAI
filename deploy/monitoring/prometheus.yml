global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: driftguard
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
