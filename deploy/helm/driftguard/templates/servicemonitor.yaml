{{- if .Values.monitoring.serviceMonitor.enabled }}
# Requires the Prometheus Operator CRDs (kube-prometheus-stack).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "driftguard.fullname" . }}
  labels:
    {{- include "driftguard.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.serviceMonitor.releaseLabel }}
spec:
  selector:
    matchLabels:
      {{- include "driftguard.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
