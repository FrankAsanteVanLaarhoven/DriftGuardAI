{{- if and .Values.canary.enabled .Values.canary.autoRollback.enabled }}
# Least privilege for the rollback guard: it may scale and annotate ONLY the
# canary deployment, nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "driftguard.fullname" . }}-canary-guard
  labels:
    {{- include "driftguard.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "driftguard.fullname" . }}-canary-guard
  labels:
    {{- include "driftguard.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ include "driftguard.fullname" . }}-canary"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["{{ include "driftguard.fullname" . }}-canary"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "driftguard.fullname" . }}-canary-guard
  labels:
    {{- include "driftguard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "driftguard.fullname" . }}-canary-guard
subjects:
  - kind: ServiceAccount
    name: {{ include "driftguard.fullname" . }}-canary-guard
    namespace: {{ .Release.Namespace }}
{{- end }}
