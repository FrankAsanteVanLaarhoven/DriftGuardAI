# Local prod-like stack: DriftGuard API + Prometheus + Grafana + MLflow.
# Start:  make stack     (docker compose up -d --build)
# The app and the MLflow tracking server share the single DriftGuard image.
name: driftguard

services:
  app:
    build:
      context: .
    image: driftguard:local
    ports:
      - "${DRIFTGUARD_APP_PORT:-8000}:8000"
    environment:
      DRIFTGUARD_LOG_LEVEL: INFO
      DRIFTGUARD_MLFLOW_TRACKING_URI: http://mlflow:5000
      # Empty = serve the baked-in primary via the pointer, then fall back to
      # baseline. Set to models:/driftguard@production to pull from the registry.
      DRIFTGUARD_PRIMARY_MODEL_URI: ""
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
    depends_on:
      - mlflow

  mlflow:
    build:
      context: .
    image: driftguard:local
    user: "10001"
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "${DRIFTGUARD_MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow-data:/mlflow
    # Override the shared image's healthcheck (which probes the app's :8000) with mlflow's own port.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').getcode()==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "${DRIFTGUARD_PROM_PORT:-9090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "${DRIFTGUARD_GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mlflow-data:
